name: Feature request
description: 提议功能、契约变更或新适配器 / Propose a feature or adapter
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: project
    attributes:
      label: 项目范围 / Project scope
      options:
        - CC Theme
        - mac-codex
        - mac-workbuddy
        - Claude Adapter registration proposal
        - win-codex
        - win-workbuddy
        - .cctheme contract
        - Theme catalog or registry
        - New platform adapter
        - Repository or documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem to solve
      description: 请描述用户问题，而不只是预设的实现方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered
  - type: textarea
    id: safety
    attributes:
      label: 兼容性与安全影响 / Compatibility and safety impact
      description: 新适配器请说明安装、验证、恢复、版本固定和不修改官方应用包的方案。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认 / Checklist
      options:
        - label: 我已搜索现有 Issue 和路线图；Windows 实现仍需用户先恢复 paused-by-user 状态。
          required: true
        - label: 此建议不要求分发第三方官方应用或绕过平台安全机制。
          required: true
