name: Client compatibility report
description: 报告桌面客户端升级后的兼容或失效情况
title: "[Compatibility]: "
labels:
  - compatibility
body:
  - type: dropdown
    id: adapter
    attributes:
      label: 适配器 / Adapter
      options:
        - mac-codex
        - mac-workbuddy
        - win-codex
        - win-workbuddy
        - Other
    validations:
      required: true
  - type: input
    id: adapter_version
    attributes:
      label: 适配器版本或提交 / Adapter version or commit
    validations:
      required: true
  - type: input
    id: client_version
    attributes:
      label: 客户端完整版本 / Full client version
    validations:
      required: true
  - type: input
    id: operating_system
    attributes:
      label: 操作系统版本 / Operating system version
    validations:
      required: true
  - type: dropdown
    id: background_mode
    attributes:
      label: 背景模式 / Background mode
      options:
        - Static image
        - Muted video
        - Ripple
        - Directional follow
        - Not applicable
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: 验证结果 / Result
      options:
        - Compatible in tested flows
        - Partially compatible
        - Incompatible
    validations:
      required: true
  - type: textarea
    id: flows
    attributes:
      label: 已验证流程 / Tested flows
      description: 列出 New Task、Settings、Composer、Terminal、恢复等实际测试项。
    validations:
      required: true
  - type: textarea
    id: failures
    attributes:
      label: 失败与差异 / Failures and differences
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认 / Privacy checklist
      options:
        - label: 截图和诊断信息已移除账户、任务、令牌、私人路径和用户媒体。
          required: true
